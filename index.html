<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site login</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="style/style.css">
     <link rel="stylesheet" href="style/media.css">
</head>
<body>
    <main>
        <section id="login">
            <div id="img">

            </div>
            <div id="form">
                <h1>Login</h1>
                <p>Bem-vindo(a) de volta! Faça login para acessar sua conta e personalizar seu ambiente.</p>
                <form action="#" method="post" autocomplete="on">
                    <div class="campo">
                        <span class="material-icons">person</span>
                        <input type="email" name="login" id="loginID" placeholder="E-mail" autocomplete="email" required maxlength="30">
                        <label for="loginID">Login:</label>
                    </div>
                    <div class="campo">
                        <span class="material-icons">vpn_key</span>
                        <input type="password" name="password" id="passwordID" autocomplete="current-password" 
                        placeholder="Password" required minlength="6" maxlength="20">
                        <label for="passwordID">Senha:</label>
                    </div>
                    <input type="submit" value="Entrar">
                    <a href="Esqueci.html" class="btt">Esqueci a senha <span class="material-icons">mail</span> </a>

                </form>

            </div>

        </section>
    </main>
    
</body>
</html>
